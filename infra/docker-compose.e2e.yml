# Оверлей к корневому docker-compose.yml для e2e: подменяет Caddyfile на
# e2e-вариант (внутренний CA + хост relay.test). Запуск:
#   SITE_PASSWORD=testpass123 docker compose \
#     -f docker-compose.yml -f infra/docker-compose.e2e.yml up -d
# Затем Playwright-контейнер в сети relay_default с --add-host relay.test:<caddy_ip>.
services:
  caddy:
    volumes:
      - ./infra/Caddyfile.e2e:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
