# Dev-стек: api (Nest, watch) + web (Next, Turbopack) + caddy (единый TLS).
# Поднять из корня репо:  docker compose -f infra/docker-compose.dev.yml up
# Затем открыть https://localhost (самоподписанный internal-CA Caddy).
#
# Нет локального Node: всё крутится в node:20-alpine (corepack → pnpm).
# node_modules держим в именованных томах, чтобы bind-mount исходников с macOS
# не затирал установленные в контейнере зависимости (и наоборот).

name: relay-dev

x-node: &node
  image: node:20-alpine
  working_dir: /app
  environment:
    # macOS bind-mount не шлёт inotify — включаем polling для надёжного hot-reload.
    - WATCHPACK_POLLING=true
    - CHOKIDAR_USEPOLLING=true
  volumes:
    - ..:/app
    - nm_root:/app/node_modules
    - nm_api:/app/apps/api/node_modules
    - nm_web:/app/apps/web/node_modules
    - nm_shared:/app/packages/shared/node_modules

services:
  # Одноразовая установка зависимостей: остальные сервисы ждут её завершения,
  # чтобы не было гонки за общий pnpm-store при параллельном install.
  install:
    <<: *node
    command: sh -c "corepack enable && pnpm install --frozen-lockfile"
    environment:
      # web/api mediasoup-воркер не нужен (sfu собирается своим Dockerfile),
      # а на alpine его postinstall падает (пребилд не под musl, python нет).
      # Заданный MEDIASOUP_WORKER_BIN заставляет postinstall пропустить сборку.
      - MEDIASOUP_WORKER_BIN=/bin/true

  api:
    <<: *node
    working_dir: /app/apps/api
    command: sh -c "corepack enable && pnpm dev"
    depends_on:
      install:
        condition: service_completed_successfully
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - PORT=3000
      - UPLOAD_DIR=/app/apps/api/uploads
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - STUN_URLS=${STUN_URLS:-}
      - TURN_URLS=${TURN_URLS:-}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      - SFU_URL=${SFU_URL:-/}
      - SFU_SECRET=${SFU_SECRET:-}
      # В dev sfu остаётся в bridge-сети (host-сеть в Docker Desktop не работает),
      # так что health-пинг ходит по compose-имени — это и есть дефолт в коде.
      - SFU_INTERNAL_URL=${SFU_INTERNAL_URL:-http://sfu:3100}
    expose:
      - "3000"

  web:
    <<: *node
    working_dir: /app/apps/web
    command: sh -c "corepack enable && pnpm dev"
    depends_on:
      install:
        condition: service_completed_successfully
    environment:
      # Polling — для hot-reload на macOS bind-mount (как в anchor x-node).
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      # Гейт доступа теперь в Next middleware — ему нужен тот же SITE_PASSWORD,
      # что и у api, иначе verifyToken не сойдётся с выданной кукой.
      - SITE_PASSWORD=${SITE_PASSWORD:-}
    expose:
      - "3001"

  # Медиасервер: docker compose -f infra/docker-compose.dev.yml --profile sfu up
  # Собирается из своего Dockerfile (bookworm, mediasoup — нативный воркер), а не
  # из общего node:20-alpine: на musl он бы компилировался из исходников минутами.
  # Hot-reload здесь не нужен — клиентская часть живёт в web.
  sfu:
    build:
      context: ..
      dockerfile: apps/sfu/Dockerfile
    profiles: ["sfu"]
    environment:
      - PORT=3100
      - SFU_SECRET=${SFU_SECRET:-}
      - SFU_ANNOUNCED_IP=${SFU_ANNOUNCED_IP:-}
      - SFU_RTC_MIN_PORT=${SFU_RTC_MIN_PORT:-40000}
      - SFU_RTC_MAX_PORT=${SFU_RTC_MAX_PORT:-40100}
    ports:
      - "${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}:${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}/udp"
      - "${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}:${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}/tcp"
    expose:
      - "3100"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  nm_root:
  nm_api:
  nm_web:
  nm_shared:
  caddy_data:
  caddy_config:
