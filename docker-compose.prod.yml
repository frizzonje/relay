# relay — self-host stack on prebuilt GHCR images (no source build).
#
# This is what install.sh deploys: it downloads this file + Caddyfile + .env
# into /opt/relay and runs `docker compose up -d`. Nothing is compiled on the
# server — api/web are pulled from ghcr.io. To build from source instead, use
# the repo's docker-compose.yml (build: context).
#
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile turn up -d   # with TURN
#   docker compose -f docker-compose.prod.yml --profile sfu up -d    # + media server
#
# Pin a release by exporting RELAY_VERSION (defaults to :latest):
#   RELAY_VERSION=0.4.0 docker compose -f docker-compose.prod.yml up -d
#
# Config comes from .env in the same directory (SITE_PASSWORD, DOMAIN,
# SERVER_HOST, TURN_CREDENTIAL, TURN_EXTERNAL_IP, SFU_SECRET). See .env.example.

name: relay

services:
  api:
    image: ghcr.io/frizzonje/relay-api:${RELAY_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - PORT=3000
      - UPLOAD_DIR=/app/uploads
      - DATA_DIR=/app/uploads/state
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - STUN_URLS=${STUN_URLS:-}
      - TURN_URLS=${TURN_URLS:-}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      # Media server: enabled by SFU_SECRET alone (same key as the sfu service).
      # Empty => api mints no passes and the SFU mode stays disabled in the UI.
      - SFU_URL=${SFU_URL:-/}
      - SFU_SECRET=${SFU_SECRET:-}
      # Internal address for the sfu health ping: sfu runs on the host network
      # (see below), so the compose DNS name no longer points at it.
      - SFU_INTERNAL_URL=${SFU_INTERNAL_URL:-http://host.docker.internal:3100}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"

  web:
    image: ghcr.io/frizzonje/relay-web:${RELAY_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - SITE_PASSWORD=${SITE_PASSWORD:-}
    expose:
      - "3001"

  # Media server (profile: sfu) — calls of 4+ with video: everyone uploads their
  # video once to the server instead of once per peer. Without it everything
  # still works over p2p (mesh), just with a ceiling of 2-3 videos.
  # Firewall: open the RTC range 40000-40100, both UDP and TCP.
  sfu:
    image: ghcr.io/frizzonje/relay-sfu:${RELAY_VERSION:-latest}
    profiles: ["sfu"]
    pull_policy: always
    # Host network instead of publishing the port range: for ~100 RTC ports
    # docker would spawn hundreds of userland proxies and push every RTP packet
    # through DNAT — real CPU cost on a small VM and one more way for media to
    # die mid-call. Same reasoning as coturn below. Signalling now listens on
    # host port 3100 — do NOT open it on the firewall (Caddy reaches it via the
    # host gateway); the RTC range 40000-40100 (UDP+TCP) is all you expose.
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=3100
      - SFU_SECRET=${SFU_SECRET:-}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      # ICE candidate address. On a cloud VM behind 1:1 NAT the public IP is
      # mandatory, otherwise clients get an internal address and media dies.
      - SFU_ANNOUNCED_IP=${SFU_ANNOUNCED_IP:-${TURN_EXTERNAL_IP:-}}
      - SFU_RTC_MIN_PORT=${SFU_RTC_MIN_PORT:-40000}
      - SFU_RTC_MAX_PORT=${SFU_RTC_MAX_PORT:-40100}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      # Media-server signalling upstream: sfu lives on the host network (see
      # above), reachable from the compose network only via the host gateway.
      - SFU_UPSTREAM=host.docker.internal:3100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # TURN relay (profile: turn) — needed for calls between strict NATs (mobile,
  # CGNAT). host network so coturn sees real addresses. TURN over TLS on 5349
  # reuses Caddy's cert from the shared caddy_data volume. Firewall: open
  # 3478/udp, 3478/tcp, 5349/tcp, 49160-49200/udp.
  coturn:
    image: coturn/coturn:4-alpine
    profiles: ["turn"]
    network_mode: host
    restart: unless-stopped
    # Root: Caddy stores certs under a 0700 root dir (key 0600); coturn's default
    # `nobody` user can't read them and TLS silently falls back. Root reads as-is.
    user: "0:0"
    depends_on:
      - caddy
    environment:
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
    volumes:
      - caddy_data:/certs:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        EXT="$${TURN_EXTERNAL_IP:-$$SERVER_HOST}"
        case "$$EXT" in
          ""|*[!0-9.]*) EXTFLAG="" ;;
          *) EXTFLAG="--external-ip=$$EXT" ;;
        esac
        CERT=$$(find /certs/caddy/certificates -type f -name "$$SERVER_HOST.crt" 2>/dev/null | head -n1)
        KEY=$$(find /certs/caddy/certificates -type f -name "$$SERVER_HOST.key" 2>/dev/null | head -n1)
        if [ -n "$$CERT" ] && [ -n "$$KEY" ]; then
          TLSFLAGS="--tls-listening-port=5349 --cert=$$CERT --pkey=$$KEY --no-dtls"
        else
          TLSFLAGS="--no-tls --no-dtls"
        fi
        exec turnserver -n --log-file=stdout \
          --realm="$$SERVER_HOST" \
          --listening-port=3478 \
          --min-port=49160 --max-port=49200 \
          --lt-cred-mech \
          --user="$$TURN_USERNAME:$$TURN_CREDENTIAL" \
          $$TLSFLAGS --no-cli \
          --no-multicast-peers \
          --denied-peer-ip=10.0.0.0-10.255.255.255 \
          --denied-peer-ip=172.16.0.0-172.31.255.255 \
          --denied-peer-ip=192.168.0.0-192.168.255.255 \
          $$EXTFLAG

volumes:
  uploads:
  caddy_data:
  caddy_config:
