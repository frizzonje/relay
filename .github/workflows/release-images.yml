# Publish production api/web images to GHCR.
#
# Trigger: pushing a version tag (v0.4.0, v1.2.3) or a manual dispatch. The
# installer (install.sh) and docker-compose.prod.yml pull these images, so the
# self-host stack never builds anything on the user's server.
#
# Images:
#   ghcr.io/frizzonje/relay-api
#   ghcr.io/frizzonje/relay-web
#
# Tags applied: the git tag without leading "v" (0.4.0) + "latest".
name: release-images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.4.0). "latest" is always added.'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build · push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            image: ghcr.io/frizzonje/relay-api
          - app: web
            image: ghcr.io/frizzonje/relay-web
    steps:
      - uses: actions/checkout@v4

      - name: Derive version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.tag }}"
          fi
          echo "version=$V" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
