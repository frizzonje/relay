# relay — прод-стек. Единая точка входа из корня репо:
#
#   docker compose up --build
#
# С TURN-ретранслятором (нужен для звонков между строгими NAT):
#
#   docker compose --profile turn up --build
#
# Открыть: https://localhost (self-signed internal CA Caddy) или https://$DOMAIN.
#
# .env в корне репо:
#   SITE_PASSWORD=секрет          # пароль на вход
#   DOMAIN=example.com            # пусто → localhost (internal CA Caddy)
#   SERVER_HOST=example.com       # для ICE-конфига и realm coturn
#   TURN_CREDENTIAL=...           # обязателен при --profile turn
#   TURN_EXTERNAL_IP=1.2.3.4      # публичный IP на облачных VM за 1:1 NAT
#
# Архитектура: Caddy (единый origin, TLS) → api (NestJS :3000) + web (Next.js :3001).
# Dev-стек с hot-reload:  docker compose -f infra/docker-compose.dev.yml up

name: relay

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - UPLOAD_DIR=/app/uploads
      # Реестр серверов/каналов — на persistent-том uploads (подпапка state/),
      # чтобы серверы пользователей переживали рестарт/пересборку контейнера.
      - DATA_DIR=/app/uploads/state
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - STUN_URLS=${STUN_URLS:-}
      - TURN_URLS=${TURN_URLS:-}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      # Медиасервер: включается заданием SFU_SECRET (тот же ключ, что у сервиса
      # sfu) — без него api не выдаст ни одного пропуска и режим SFU в интерфейсе
      # останется выключенным. SFU_URL по умолчанию «тот же origin»: сигналинг
      # медиасервера ходит через Caddy на /sfu/.
      - SFU_URL=${SFU_URL:-/}
      - SFU_SECRET=${SFU_SECRET:-}
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      # Гейт доступа — в Next middleware; ему нужен тот же SITE_PASSWORD, что и
      # api, иначе verifyToken не сойдётся с выданной кукой relay_pass.
      - SITE_PASSWORD=${SITE_PASSWORD:-}
    expose:
      - "3001"

  # Медиасервер (SFU): звонки на 4+ человек с видео. Без него всё работает на
  # p2p (mesh) — поэтому профиль опциональный, как у coturn.
  #
  #   docker compose --profile sfu up --build
  #
  # На фаерволе нужно открыть диапазон RTC-портов (по умолчанию 40000-40100,
  # UDP и TCP) и задать SFU_SECRET — общий с api ключ подписи пропусков.
  sfu:
    build:
      context: .
      dockerfile: apps/sfu/Dockerfile
    profiles: ["sfu"]
    restart: unless-stopped
    environment:
      - PORT=3100
      - SFU_SECRET=${SFU_SECRET:-}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      # Адрес в ICE-кандидатах. На облачной VM за 1:1 NAT обязателен публичный
      # IP — иначе клиент получит адрес контейнера и медиа не пойдёт.
      - SFU_ANNOUNCED_IP=${SFU_ANNOUNCED_IP:-${TURN_EXTERNAL_IP:-}}
      - SFU_RTC_MIN_PORT=${SFU_RTC_MIN_PORT:-40000}
      - SFU_RTC_MAX_PORT=${SFU_RTC_MAX_PORT:-40100}
    # Медиа идёт мимо Caddy напрямую в контейнер: пробрасываем диапазон как есть.
    # Сигналинг (WS) — наоборот, через Caddy на /sfu/, наружу порт 3100 не нужен.
    ports:
      - "${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}:${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}/udp"
      - "${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}:${SFU_RTC_MIN_PORT:-40000}-${SFU_RTC_MAX_PORT:-40100}/tcp"
    expose:
      - "3100"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      # DOMAIN пуст → Caddy слушает localhost и выдаёт self-signed (internal CA).
      # Реальный домен → сертификат от Let's Encrypt берётся автоматически.
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # TURN-ретранслятор: без него звонок между строгими NAT (мобильный интернет,
  # CGNAT, корпоративные сети) не соберётся. host-сеть нужна, чтобы coturn видел
  # реальные адреса и раздал диапазон relay-портов.
  #
  # TURN over TLS на 5349: серт берём из тома Caddy (тот же LE/internal-CA серт,
  # что и у веба) — свой ACME поднимать не нужно. На строгих сетях с DPI, где
  # проходит только TLS, turns:5349 — единственный путь собрать звонок.
  # На фаерволе дополнительно откройте 5349/tcp. При ротации серта Caddy'ем
  # coturn держит старый серт в памяти — нужен рестарт контейнера (напр. крон).
  coturn:
    image: coturn/coturn:4-alpine
    profiles: ["turn"]
    network_mode: host
    restart: unless-stopped
    # Под root: серты Caddy лежат в каталоге 0700 root (приватный ключ 0600) —
    # штатный образный юзер `nobody` их не прочитает, и TLS молча откатится. Root
    # читает как есть, без ослабления прав серта и без поломки авто-ротации.
    user: "0:0"
    depends_on:
      - caddy
    environment:
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
    volumes:
      # Серты Caddy (read-only) — для TURN over TLS. Тот же том, что пишет caddy.
      - caddy_data:/certs:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        EXT="$${TURN_EXTERNAL_IP:-$$SERVER_HOST}"
        case "$$EXT" in
          ""|*[!0-9.]*) EXTFLAG="" ;;
          *) EXTFLAG="--external-ip=$$EXT" ;;
        esac
        # Ищем серт Caddy по имени хоста (не привязываемся к пути ACME-каталога:
        # у LE и internal-CA он разный). Нашли пару crt+key → включаем TLS на
        # 5349; нет (localhost/дев или серт ещё не выпущен) → работаем без TLS.
        CERT=$$(find /certs/caddy/certificates -type f -name "$$SERVER_HOST.crt" 2>/dev/null | head -n1)
        KEY=$$(find /certs/caddy/certificates -type f -name "$$SERVER_HOST.key" 2>/dev/null | head -n1)
        if [ -n "$$CERT" ] && [ -n "$$KEY" ]; then
          TLSFLAGS="--tls-listening-port=5349 --cert=$$CERT --pkey=$$KEY --no-dtls"
        else
          TLSFLAGS="--no-tls --no-dtls"
        fi
        exec turnserver -n --log-file=stdout \
          --realm="$$SERVER_HOST" \
          --listening-port=3478 \
          --min-port=49160 --max-port=49200 \
          --lt-cred-mech \
          --user="$$TURN_USERNAME:$$TURN_CREDENTIAL" \
          $$TLSFLAGS --no-cli \
          --no-multicast-peers \
          --denied-peer-ip=10.0.0.0-10.255.255.255 \
          --denied-peer-ip=172.16.0.0-172.31.255.255 \
          --denied-peer-ip=192.168.0.0-192.168.255.255 \
          $$EXTFLAG

volumes:
  uploads:
  caddy_data:
  caddy_config:
